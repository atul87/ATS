name: Tests

on:
  push:
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project code
        run: python -m compileall backend frontend tests -q

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting
        run: black --check .

      - name: Run unit tests
        run: python -m pytest tests -v -k "not test_e2e"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright and browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests/test_e2e.py -v

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            artifacts/
            logs/

  docker-dry-run:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp .env.example .env
          sed -i 's/MOCK_AUTH=false/MOCK_AUTH=true/g' .env

      - name: Build Docker images
        run: docker compose build

      - name: Run backend container and verify health
        run: |
          docker compose up -d backend
          # Poll backend health endpoint
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/v1/health; then
              echo "Backend is healthy!"
              exit 0
            fi
            echo "Waiting for backend to be healthy..."
            sleep 2
          done
          echo "Backend failed to become healthy. Logs:"
          docker compose logs backend
          exit 1
