name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m spacy download en_core_web_md

    - name: Run Ruff Linter
      run: ruff check backend frontend tests scripts

    - name: Run Black Formatter Check
      run: black --check backend frontend tests scripts

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Tests
      env:
        MOCK_AUTH: "true"
        ATS_FAST_MODEL_MODE: "true"
      run: |
        pytest tests/ -v

  docker-dry-run:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build Backend Docker Image
      run: docker build -t ats-backend:latest -f backend/Dockerfile .

    - name: Build Frontend Docker Image
      run: docker build -t ats-frontend:latest -f frontend/Dockerfile .
