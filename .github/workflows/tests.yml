name: Tests

on:
  push:
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile project code
        run: python -m compileall backend frontend tests -q

      - name: Run Ruff
        run: ruff check .

      - name: Check formatting
        run: black --check .

      - name: Run unit tests
        run: python -m pytest tests -v -k "not test_e2e"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-unit

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright and browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run E2E tests
        run: python -m pytest tests/test_e2e.py -v

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            artifacts/
            logs/

