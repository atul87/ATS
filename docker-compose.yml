version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BUILD_TIME: ${BUILD_TIME}
    container_name: ats_backend
    mem_limit: 2g
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ats_frontend
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
      - ./:/app

# Optionally you can add a Supabase / Postgres service here for local testing.